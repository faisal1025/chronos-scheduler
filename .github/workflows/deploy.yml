name: deploy gradle application with docker compose

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: pull to vm
        uses: actions/checkout@v6

      - name: create docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/scheduler-api:${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/scheduler-api:latest .

      - name: docker login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: docker hub push
        run: docker push ${{ secrets.DOCKER_USERNAME }}/scheduler-api:${{ github.sha }} && docker push ${{ secrets.DOCKER_USERNAME }}/scheduler-api:latest

