spring.application.name=Scheduler

server.port=${APP_PORT:9000}
spring.datasource.url=${DB_HOST:jdbc:mysql://localhost:3306/jobdb?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# --- Kafka ---
# Spring Kafka (spring-kafka) configuration
# Mapped from existing Kafka keys above so spring-kafka/spring-boot can auto-configure clients
# Uses placeholders to reuse the values already defined in this file (bootstrap.servers, sasl.jaas.config, etc.)
spring.kafka.bootstrap-servers=${KAFKA_SERVER}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=auth-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.chronos.Scheduler.entity
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=PLAIN
spring.kafka.properties.sasl.jaas.config=${KAFKA_JAAS_CONFIG}
spring.kafka.properties.session.timeout.ms=${session.timeout.ms:45000}

# Producer-specific settings
spring.kafka.producer.acks=all
spring.kafka.producer.client-id=${KAFKA_PRODUCER_CLIENT}

# Shared Kafka client properties (security, SASL, DNS lookup, timeouts)
spring.kafka.properties.client.dns.lookup=use_all_dns_ips